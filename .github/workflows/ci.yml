name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      # Cache the auto-downloaded ONNX runtime + model so we only pay the
      # ~100 MB HTTP bill on cache-miss. Cache key is tied to the upstream
      # versions pinned in setup.go — bumping them invalidates the cache.
      - name: Cache ONNX runtime + model
        uses: actions/cache@v4
        with:
          path: ~/.brief
          key: brief-deps-${{ matrix.goos }}-${{ matrix.goarch }}-ort1.22.0-xenova-minilm-v1

      - run: make vet
      - run: make test
      - run: make build
