name: Bench

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: CPU info
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            lscpu | head -20
          else
            sysctl -n machdep.cpu.brand_string
            sysctl -n hw.ncpu
          fi

      - name: Dot-product benchmarks
        run: |
          go test -run='^$' -bench='^BenchmarkDot' -benchmem -count=5 -benchtime=5s ./ivf/ | tee bench.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bench.txt
          if-no-files-found: error
